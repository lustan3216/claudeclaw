# goclaudeclaw 配置示例
# 复制为 config.yaml 并填入真实值

# claude 执行目录（所有 bot 默认使用此 workspace）
workspace: /path/to/your/project

# ── Telegram Bots ──────────────────────────────────────────────────────────────
# 支持多个 bot，每个独立 goroutine，共享同一个 claude session 和记忆
bots:
  - name: "main"
    token: "TELEGRAM_BOT_TOKEN_1"        # BotFather 获取
    allowed_users: [123456789]            # Telegram user ID 白名单，必填
    debounce_ms: 1500                     # 防抖窗口（毫秒），窗口内消息合并后发给 claude

  - name: "work"
    token: "TELEGRAM_BOT_TOKEN_2"
    allowed_users: [123456789]
    debounce_ms: 500                      # 工作 bot 响应更快

# ── 记忆服务 ───────────────────────────────────────────────────────────────────
memory:
  provider: "claude-mem"                  # "claude-mem" | "mem0"
  endpoint: "http://localhost:8080"       # claude-mem 服务地址

# ── 心跳定时提示 ───────────────────────────────────────────────────────────────
# 每隔一段时间向 claude 发送一次 prompt，适合定期检查待办、生成摘要等
heartbeat:
  enabled: true
  interval_minutes: 15
  prompt: "Check pending tasks and summarize any important updates."
  timezone: "Asia/Shanghai"               # 时区（用于静默窗口判断）
  quiet_windows:                          # 静默时段内跳过心跳
    - start: "23:00"
      end: "08:00"

# ── 定时任务 ───────────────────────────────────────────────────────────────────
# 使用标准 cron 表达式（秒 分 时 日 月 周）
cron_jobs:
  - name: "daily-report"
    schedule: "0 0 9 * * *"              # 每天 09:00 执行
    prompt: "Generate a daily summary of yesterday's work."
    workspace: ""                         # 留空使用全局 workspace

  - name: "hourly-check"
    schedule: "0 0 * * * *"              # 每小时整点
    prompt: "Quick check: any urgent items in the queue?"

# ── 安全级别 ───────────────────────────────────────────────────────────────────
security:
  # locked        - 仅只读操作
  # strict        - 每个工具调用需确认
  # moderate      - 大多数操作自动通过（默认）
  # unrestricted  - 跳过所有权限检查（--dangerously-skip-permissions）
  level: "moderate"

# ── Web 管理接口 ───────────────────────────────────────────────────────────────
# 提供 /health /status /metrics 等端点（暂未实现，预留配置）
web:
  enabled: false
  host: "127.0.0.1"
  port: 4632
